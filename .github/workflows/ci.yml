name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'
  DATABASE_URL: postgresql://aigateway:aigateway@127.0.0.1:5432/aigateway_test?schema=public
  REDIS_URL: redis://127.0.0.1:6379
  MOCK_PROVIDER_ENABLED: 'true'
  QWEN_ENABLED: 'false'
  GLM_ENABLED: 'false'
  DEEPSEEK_ENABLED: 'false'
  KIMI_ENABLED: 'false'
  WANXIANG_ENABLED: 'false'
  COGVIEW_ENABLED: 'false'

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.34.5
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Validate Prisma schema
        run: pnpm db:validate

      - name: Typecheck
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Build workspace
        run: pnpm build

  mock-integration:
    name: PostgreSQL/Redis Mock E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      TEST_DATABASE_URL: postgresql://aigateway:aigateway@127.0.0.1:5432/aigateway_test?schema=public

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: aigateway_test
          POSTGRES_USER: aigateway
          POSTGRES_PASSWORD: aigateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aigateway -d aigateway_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.34.5
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert paid providers are isolated
        shell: bash
        run: |
          if env | grep -Eq '^(QWEN|GLM|DEEPSEEK|KIMI|WANXIANG|COGVIEW)_API_KEY='; then
            echo 'CI must not receive real provider credentials.' >&2
            exit 1
          fi

      - name: Run deterministic Mock regression
        run: pnpm test:mock-chat

  production-images:
    name: Production images
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Assert production secrets are not tracked or injected
        shell: bash
        run: |
          tracked_env_files="$({ git ls-files | grep -E '(^|/)\.env($|\.)' || true; } | grep -Ev '(^|/)\.env(\.production)?\.example$' || true)"
          if [ -n "$tracked_env_files" ]; then
            echo 'A non-example environment file is tracked.' >&2
            exit 1
          fi

          if grep -REq '\$\{\{[[:space:]]*secrets\.(QWEN|GLM|DEEPSEEK|KIMI|WANXIANG|COGVIEW)_' .github/workflows; then
            echo 'CI must not inject paid-provider secrets.' >&2
            exit 1
          fi

      - name: Validate production Compose
        run: docker compose --env-file .env.production.example -f infra/compose/compose.prod.yml config --quiet

      - name: Verify Chat SSE proxy guardrails
        run: pnpm test:nginx-sse

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Build Web runtime image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/web/Dockerfile
          target: runtime
          push: false
          tags: ai-gateway-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build API runtime image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/api/Dockerfile
          target: runtime
          push: false
          tags: ai-gateway-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build migration image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: apps/api/Dockerfile
          target: migration
          push: false
          tags: ai-gateway-migration:${{ github.sha }}
          cache-from: type=gha,scope=migration
          cache-to: type=gha,mode=max,scope=migration
