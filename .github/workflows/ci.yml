name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CI: 'true'
  DATABASE_URL: postgresql://aigateway:aigateway@127.0.0.1:5432/aigateway_test?schema=public
  REDIS_URL: redis://127.0.0.1:6379
  MOCK_PROVIDER_ENABLED: 'true'
  QWEN_ENABLED: 'false'
  GLM_ENABLED: 'false'
  DEEPSEEK_ENABLED: 'false'
  KIMI_ENABLED: 'false'
  WANXIANG_ENABLED: 'false'
  COGVIEW_ENABLED: 'false'

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.34.5
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check formatting
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Validate Prisma schema
        run: pnpm db:validate

      - name: Typecheck
        run: pnpm typecheck

      - name: Run unit tests
        run: pnpm test

      - name: Build workspace
        run: pnpm build

  mock-integration:
    name: PostgreSQL/Redis Mock E2E
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      TEST_DATABASE_URL: postgresql://aigateway:aigateway@127.0.0.1:5432/aigateway_test?schema=public

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: aigateway_test
          POSTGRES_USER: aigateway
          POSTGRES_PASSWORD: aigateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aigateway -d aigateway_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10.34.5
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Assert paid providers are isolated
        shell: bash
        run: |
          if env | grep -Eq '^(QWEN|GLM|DEEPSEEK|KIMI|WANXIANG|COGVIEW)_API_KEY='; then
            echo 'CI must not receive real provider credentials.' >&2
            exit 1
          fi

      - name: Run deterministic Mock regression
        run: pnpm test:mock-chat
